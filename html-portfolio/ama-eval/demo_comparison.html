<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>简单问题输出对比：通用 vs lite_card</title>
<style>
* { box-sizing: border-box; }
body { margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:32px 0; background:#f0f0f0; font-family:-apple-system,sans-serif; }
h1 { font-size:18px; color:#333; margin-bottom:4px; font-weight:600; }
.subtitle { font-size:13px; color:#999; margin-bottom:24px; }
.row { display:flex; gap:40px; align-items:flex-start; }
.col { display:flex; flex-direction:column; align-items:center; }
.label { margin-bottom:12px; font-size:13px; color:#888; letter-spacing:1px; font-weight:500; }
.phone { width:399px; border-radius:48px; background:#111; padding:12px; box-shadow:0 16px 64px rgba(0,0,0,.3); overflow:hidden; }
.status-bar { height:44px; background:#fff; border-radius:36px 36px 0 0; position:relative; }
.status-bar::before { content:''; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:100px; height:24px; background:#111; border-radius:12px; }
.phone iframe { display:block; width:375px; height:750px; border:none; border-radius:0 0 36px 36px; background:#fff; }
.stat { margin-top:8px; font-size:12px; color:#aaa; }
</style></head><body>
<h1>简单问题输出对比</h1>
<div class="subtitle">Query: "这是什么花？"</div>
<div class="row">
  <div class="col">
    <div class="label">通用（基线）</div>
    <div class="phone">
      <div class="status-bar"></div>
      <iframe src="demo_baseline_inner.html"></iframe>
    </div>
    <div class="stat">模型输出 7,421 字符</div>
  </div>
  <div class="col">
    <div class="label">lite_card（实验组）</div>
    <div class="phone">
      <div class="status-bar"></div>
      <iframe src="demo_lite_card_inner.html"></iframe>
    </div>
    <div class="stat">模型输出 252 字符</div>
  </div>
</div>
</body></html>
