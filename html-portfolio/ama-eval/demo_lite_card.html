<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>lite_card 示例 — 这是什么花？</title>
<style>
* { box-sizing: border-box; }
body { margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:32px 0; background:#f0f0f0; font-family:-apple-system,sans-serif; }
.label { margin-bottom:12px; font-size:13px; color:#888; letter-spacing:1px; }
.phone { width:399px; border-radius:48px; background:#111; padding:12px; box-shadow:0 16px 64px rgba(0,0,0,.3); overflow:hidden; }
.status-bar { height:44px; background:#fff; border-radius:36px 36px 0 0; position:relative; }
.status-bar::before { content:''; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:100px; height:24px; background:#111; border-radius:12px; }
.phone iframe { display:block; width:375px; height:750px; border:none; border-radius:0 0 36px 36px; background:#fff; }
</style></head><body>
<div class="label">LITE_CARD &middot; iPhone 14 (375x812)</div>
<div class="phone">
  <div class="status-bar"></div>
  <iframe src="demo_lite_card_inner.html"></iframe>
</div>
</body></html>
