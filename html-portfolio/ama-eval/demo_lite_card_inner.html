        (function () {
            var timer = null;
            var PAGE_WIDTH = 686;
            var PAGE_FONT_SIZE = 30;

            function onResize() {
              var e = PAGE_FONT_SIZE * document.documentElement.clientWidth / PAGE_WIDTH;
              e = parseFloat(e.toFixed(3));
              document.documentElement.style.fontSize = e + 'px';
              var realitySize = parseFloat(window.getComputedStyle(document.documentElement).fontSize);
              if (e !== realitySize) {
                e = e * e / realitySize;
                document.documentElement.style.fontSize = e + 'px';
              }
            }
            window.addEventListener('resize', function () {
              if (timer) clearTimeout(timer);
              timer = setTimeout(onResize, 100);

    <script>
    
        function compareVersion(version1, version2) {
            if (version1 == null || version2 == null) {
                return -1
            }
            const v1 = version1?.trim() || '';
            const v2 = version2?.trim() || '';
            const arr1 = v1.split('.').map(num => Number(num));
            const arr2 = v2.split('.').map(num => Number(num));
            const maxLength = Math.max(arr1.length, arr2.length);
            for (let i = 0; i < maxLength; i++) {
                const num1 = arr1[i] || 0;
                const num2 = arr2[i] || 0;
                if (num1 > num2) {
                    return 1;
                } else if (num1 < num2) {
                    return -1;
                }
            }
            return 0;
        }

        function need_image_by_version(userAgent) {
            console.log('image user agent:', userAgent)
            if (!userAgent.includes('Mobile')) {
                return true;
            }
            const regex = /(Leopard)\/([\d.]+)/;
            const matchResult = userAgent.match(regex);
            version = null
            compareNum = -1;
            if (matchResult) {
                version = matchResult[2];
                console.log('version:', version);
                compareNum = compareVersion(version, '1.0.32')
            } else {
                console.log('no Leopard info');
                return true;
            }
            return compareNum >=0
        }

            script.type = 'text/javascript';
            script.src = url;

                    registryList.push(comp);
                },

                list() {
                    return registryList.slice();

            };
