<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作过程管理工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .tab-btn:hover {
            background: #f0f0f0;
        }

        .tab-content {
            display: none !important;
        }

        .tab-content.active {
            display: block !important;
        }

        #daily-tab.active {
            display: flex !important;
            flex-direction: column;
            height: calc(100vh - 100px);
        }

        .main-content {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
            height: calc(100vh - 100px);
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                height: auto;
            }

            .add-task-section {
                position: relative;
            }

            .filters {
                position: relative;
            }
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .add-task-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            position: sticky;
            top: 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 1.3em;
            margin-bottom: 3px;
        }

        .stat-card p {
            opacity: 0.9;
            font-size: 0.85em;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 14px;
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: white;
            padding: 8px 0;
            z-index: 10;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            background: #667eea;
            color: white;
        }

        .tasks-container {
            display: grid;
            gap: 12px;
            padding-right: 10px;
        }

        .task-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
            position: relative;
        }

        .task-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 1.15em;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .task-description {
            color: #666;
            margin-bottom: 10px;
            line-height: 1.5;
            font-size: 14px;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .priority-p0 {
            background: #fee;
            color: #c33;
        }

        .priority-p1 {
            background: #ffd;
            color: #c90;
        }

        .priority-p2 {
            background: #efe;
            color: #3c3;
        }

        .status-todo {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-progress {
            background: #fff3e0;
            color: #f57c00;
        }

        .status-done {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status-delay {
            background: #fce4ec;
            color: #c2185b;
        }

        .progress-updates {
            margin: 15px 0;
        }

        .progress-update-form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .progress-update-form input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .progress-update-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .progress-update-form button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .progress-update-form button:hover {
            background: #5568d3;
        }

        .progress-updates-list {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .progress-updates-list::-webkit-scrollbar {
            width: 6px;
        }

        .progress-updates-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .progress-updates-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        .progress-update-item {
            padding: 8px 10px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            position: relative;
            padding-left: 12px;
        }

        .progress-update-item:last-child {
            margin-bottom: 0;
        }

        .progress-update-item .update-time {
            font-size: 11px;
            color: #999;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .progress-update-item .update-content {
            color: #333;
            line-height: 1.4;
            word-break: break-word;
            font-size: 13px;
        }

        .progress-update-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }


        .progress-slider {
            flex: 1;
            min-width: 150px;
        }

        /* 工作日报样式 */
        .daily-report-view {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .view-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .view-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .view-btn.active {
            background: #667eea;
            color: white;
        }

        .calendar-view {
            height: 100%;
            overflow-y: auto;
            display: none;
            flex-direction: column;
        }

        .calendar-view.active {
            display: flex;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            flex: 1;
            min-height: 0;
            padding-bottom: 20px;
            align-content: start;
        }

        .calendar-day {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 8px;
            min-height: 100px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .calendar-day:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .calendar-day.weekend {
            background: #f8f9fa;
        }

        .calendar-day.workday {
            background: #fff;
        }

        .calendar-day.has-content {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .calendar-day-header {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .calendar-day-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .calendar-day-preview {
            font-size: 12px;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .day-preview-section {
            margin-bottom: 5px;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .day-preview-work {
            background: #e3f2fd;
            color: #1976d2;
        }

        .day-preview-fitness {
            background: #e8f5e9;
            color: #388e3c;
        }

        .day-preview-todo {
            background: #fff3e0;
            color: #f57c00;
        }

        .day-preview-section-title {
            font-weight: 600;
            margin-right: 5px;
        }

        .timeline-view {
            height: 100%;
            overflow-y: auto;
            padding-right: 10px;
            display: none;
        }

        .timeline-view.active {
            display: flex;
            flex-direction: column;
        }

        .timeline-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .timeline-pagination button {
            padding: 6px 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .timeline-pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        .timeline-pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timeline-pagination span {
            font-weight: 600;
            color: #333;
        }

        .timeline-items-container {
            flex: 1;
            overflow-y: auto;
        }

        .timeline-item {
            padding: 0;
            margin-bottom: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
            overflow: hidden;
        }

        .timeline-item:hover {
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
            transform: translateY(-1px);
        }

        .timeline-date {
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .timeline-date::before {
            content: '📅';
            font-size: 18px;
        }

        .timeline-content {
            padding: 12px 15px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .timeline-section {
            margin-bottom: 10px;
            padding: 0;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
        }

        .timeline-section:last-child {
            margin-bottom: 0;
        }

        .timeline-section-work {
            background: #e3f2fd;
            border-top: 3px solid #1976d2;
        }

        .timeline-section-fitness {
            background: #e8f5e9;
            border-top: 3px solid #388e3c;
        }

        .timeline-section-todo {
            background: #fff3e0;
            border-top: 3px solid #f57c00;
        }

        .timeline-section-title {
            font-weight: 700;
            font-size: 14px;
            padding: 8px 12px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .timeline-section-content {
            padding: 10px 12px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .work-item {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .work-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .work-project-name {
            font-weight: 700;
            font-size: 15px;
            color: #1976d2;
            margin-bottom: 6px;
            padding: 6px 10px;
            background: rgba(25, 118, 210, 0.12);
            border-left: 3px solid #1976d2;
            border-radius: 4px;
            display: inline-block;
        }

        .work-project-content {
            color: #333;
            line-height: 1.6;
            padding-left: 2px;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .report-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .report-modal.active {
            display: flex;
        }

        .report-modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            width: 90%;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .report-header h2 {
            color: #333;
        }

        .close-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .report-content {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            line-height: 1.8;
            color: #333;
        }

        .day-edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .day-edit-modal.active {
            display: flex;
        }

        .day-edit-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .report-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .month-nav-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .month-nav-btn:hover {
            background: #5568d3;
        }

        .current-month {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            flex: 1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="project">项目管理</button>
            <button class="tab-btn" data-tab="daily">工作日报</button>
        </div>

        <!-- 项目管理 Tab -->
        <div class="tab-content active" id="project-tab">
        <div class="main-content">
            <!-- 左侧面板：表单和统计 -->
            <div class="left-panel">
                <!-- 统计信息 -->
                <div class="stats" id="stats">
                    <div class="stat-card">
                        <h3 id="totalTasks">0</h3>
                        <p>总任务数</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="todoTasks">0</h3>
                        <p>待办</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="progressTasks">0</h3>
                        <p>进行中</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="delayTasks">0</h3>
                        <p>延迟</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="doneTasks">0</h3>
                        <p>已完成</p>
                    </div>
                </div>

                <!-- 导入Excel数据 -->
                <div style="margin-bottom: 15px;">
                    <button class="btn btn-primary" onclick="importExcelData()" style="width: 100%;">📥 导入Excel数据</button>
                </div>

                <!-- 添加任务表单 -->
                <div class="add-task-section">
                    <h2 style="margin-bottom: 20px; font-size: 1.3em;">➕ 添加新任务</h2>
                    <form id="taskForm">
                        <div class="form-group">
                            <label for="taskTitle">任务标题 *</label>
                            <input type="text" id="taskTitle" required placeholder="输入任务标题">
                        </div>
                        <div class="form-group">
                            <label for="taskDescription">任务描述</label>
                            <textarea id="taskDescription" placeholder="输入任务详细描述"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="taskPriority">优先级</label>
                                <select id="taskPriority">
                                    <option value="p0">P0</option>
                                    <option value="p1" selected>P1</option>
                                    <option value="p2">P2</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="taskStatus">状态</label>
                                <select id="taskStatus">
                                    <option value="todo" selected>待办</option>
                                    <option value="progress">进行中</option>
                                    <option value="delay">延迟</option>
                                    <option value="done">已完成</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="taskProgress">完成进度 (%)</label>
                            <input type="range" id="taskProgress" min="0" max="100" value="0" step="5">
                            <div style="text-align: center; margin-top: 5px;">
                                <span id="progressValue">0%</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">添加任务</button>
                    </form>
                </div>
            </div>

            <!-- 右侧面板：任务列表 -->
            <div class="right-panel">
                <!-- 筛选器 -->
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="todo">待办</button>
                    <button class="filter-btn" data-filter="progress">进行中</button>
                    <button class="filter-btn" data-filter="delay">延迟</button>
                    <button class="filter-btn" data-filter="done">已完成</button>
                    <button class="filter-btn" data-filter="p0">P0</button>

        // 数据存储
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        // 数据迁移：确保所有任务都有progressUpdates字段
        tasks = tasks.map(task => {
            // 迁移旧优先级格式
            if (task.priority === 'high') task.priority = 'p0';
            else if (task.priority === 'medium') task.priority = 'p1';
            else if (task.priority === 'low') task.priority = 'p2';
            
            // 迁移progressText到progressUpdates
            if (!task.hasOwnProperty('progressUpdates')) {
                task.progressUpdates = [];
                if (task.progressText && task.progressText.trim()) {
                    task.progressUpdates.push({
                        content: task.progressText,
                        timestamp: task.createdAt || new Date().toISOString()
                    });
                }
                delete task.progressText;
            }
            return task;
        });
        if (tasks.length > 0) {
            saveTasks();
        }

        // DOM 元素
        const taskForm = document.getElementById('taskForm');
        const tasksContainer = document.getElementById('tasksContainer');
        const progressInput = document.getElementById('taskProgress');
        const progressValue = document.getElementById('progressValue');
        const filterButtons = document.querySelectorAll('.filter-btn');

        // 进度条显示
        progressInput.addEventListener('input', (e) => {
            progressValue.textContent = e.target.value + '%';
        });

        // 表单提交
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const task = {
                id: Date.now(),
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDescription').value,
                priority: document.getElementById('taskPriority').value,
                status: document.getElementById('taskStatus').value,
                progress: parseInt(document.getElementById('taskProgress').value),
                progressUpdates: [],
                createdAt: new Date().toISOString()
            };

            tasks.push(task);
            saveTasks();
            renderTasks();
            updateStats();
            taskForm.reset();
            progressValue.textContent = '0%';
        });

        // 保存任务到 localStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('todoTasks').textContent = tasks.filter(t => t.status === 'todo').length;
            document.getElementById('progressTasks').textContent = tasks.filter(t => t.status === 'progress').length;
            document.getElementById('delayTasks').textContent = tasks.filter(t => t.status === 'delay').length;
            document.getElementById('doneTasks').textContent = tasks.filter(t => t.status === 'done').length;
        }

        // 渲染任务列表
        function renderTasks() {
            let filteredTasks = tasks;

            // 应用筛选
            if (currentFilter !== 'all') {
                if (['todo', 'progress', 'delay', 'done'].includes(currentFilter)) {
                    filteredTasks = tasks.filter(t => t.status === currentFilter);
                } else if (['p0', 'p1', 'p2'].includes(currentFilter)) {
                    filteredTasks = tasks.filter(t => t.priority === currentFilter);
                }
            }

            if (filteredTasks.length === 0) {
                tasksContainer.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                        </svg>
                        <p>没有找到匹配的任务</p>
                    </div>
                `;
                return;
            }

            tasksContainer.innerHTML = filteredTasks.map(task => `
                <div class="task-card">
                    <div class="task-header">
                        <div>
                            <div class="task-title">${escapeHtml(task.title)}</div>
                            <div class="task-meta">
                                <span class="badge priority-${task.priority}">
                                    ${task.priority === 'p0' ? '🔴 P0' : task.priority === 'p1' ? '🟡 P1' : '🟢 P2'}
                                </span>
                                <span class="badge status-${task.status}">
                                    ${task.status === 'todo' ? '📝 待办' : task.status === 'progress' ? '⚙️ 进行中' : task.status === 'delay' ? '⏸️ 延迟' : '✅ 已完成'}
                                </span>
                            </div>
                        </div>
                    </div>
                    ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${task.progress}%"></div>
                    </div>
                    <div style="text-align: center; margin-bottom: 15px; color: #666; font-size: 14px;">
                        完成度: ${task.progress}%
                    </div>
                    <div class="progress-updates">
                        <label class="progress-update-label">进展更新：</label>
                        <div class="progress-update-form">
                            <input 
                                type="text" 
                                id="progressInput_${task.id}"
                                placeholder="记录任务进展、遇到的问题、下一步计划等..."
                                onkeypress="if(event.key === 'Enter') addProgressUpdate(${task.id})"
                            >
                            <button type="button" onclick="addProgressUpdate(${task.id})">发布</button>
                        </div>
                        <div class="progress-updates-list">
                            ${(task.progressUpdates && task.progressUpdates.length > 0) 
                                ? task.progressUpdates.slice()
                                    .sort((a, b) => {
                                        const timeA = a.timestamp ? new Date(a.timestamp).getTime() : 0;
                                        const timeB = b.timestamp ? new Date(b.timestamp).getTime() : 0;
                                        return timeB - timeA; // 降序，最新的在前
                                    })
                                    .map(update => `
                                    <div class="progress-update-item">
                                        <div class="update-time">${formatDateTime(update.timestamp)}</div>
                                        <div class="update-content">${escapeHtml(update.content)}</div>
                                    </div>
                                `).join('')
                                : '<div style="padding: 10px; text-align: center; color: #999; font-size: 14px;">暂无进展更新</div>'
                            }
                        </div>
                    </div>
                    <div class="task-actions">
                        <select class="btn btn-sm" onchange="updateTaskStatus(${task.id}, this.value)" style="padding: 6px 12px;">
                            <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>待办</option>
                            <option value="progress" ${task.status === 'progress' ? 'selected' : ''}>进行中</option>
                            <option value="delay" ${task.status === 'delay' ? 'selected' : ''}>延迟</option>
                            <option value="done" ${task.status === 'done' ? 'selected' : ''}>已完成</option>
                        </select>
                        <input type="range" min="0" max="100" value="${task.progress}" step="5" 
                               onchange="updateTaskProgress(${task.id}, this.value)" 
                               class="progress-slider">
                        <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 更新任务状态
        function updateTaskStatus(id, status) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = status;
                if (status === 'done') {
                    task.progress = 100;
                }
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // 更新任务进度
        function updateTaskProgress(id, progress) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.progress = parseInt(progress);
                if (progress == 100) {
                    task.status = 'done';
                } else if (progress > 0) {
                    task.status = 'progress';
                }
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // 添加进展更新
        function addProgressUpdate(id) {
            const task = tasks.find(t => t.id === id);
            const input = document.getElementById(`progressInput_${id}`);
            if (task && input && input.value.trim()) {
                if (!task.progressUpdates) {
                    task.progressUpdates = [];
                }
                task.progressUpdates.push({
                    content: input.value.trim(),
                    timestamp: new Date().toISOString()
                });
                input.value = '';
                saveTasks();
                renderTasks();
            }
        }

        // 格式化日期时间
        function formatDateTime(isoString) {
            const date = new Date(isoString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        // 删除任务
        function deleteTask(id) {
            if (confirm('确定要删除这个任务吗？')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        // 筛选按钮事件
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTasks();
            });
        });

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        renderTasks();
        updateStats();

        // ========== 工作日报功能 ==========
        let dailyReports = JSON.parse(localStorage.getItem('dailyReports')) || {};
        const today = new Date();
        let currentMonth = today.getMonth();
        let currentYear = today.getFullYear();
        
        // 限制年份范围在2025-2026
        if (currentYear < 2025) {
            currentYear = 2025;
            currentMonth = 0;
        } else if (currentYear > 2026) {
            currentYear = 2026;
            currentMonth = 11;
        }
        let currentEditingDate = null;

        // Tab切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
                
                if (btn.dataset.tab === 'daily') {
                    renderCalendar();
                }
            });

        // 2026年中国法定节假日和调休日（示例，需要根据实际情况更新）
        const holidays2026 = [
            '2026-01-01', '2026-01-02', '2026-01-03', // 元旦
            '2026-02-06', '2026-02-07', '2026-02-08', '2026-02-09', '2026-02-10', '2026-02-11', '2026-02-12', '2026-02-13', '2026-02-14', // 春节（示例）
            '2026-04-04', '2026-04-05', '2026-04-06', // 清明节（示例）
            '2026-05-01', '2026-05-02', '2026-05-03', // 劳动节（示例）
            '2026-06-08', '2026-06-09', '2026-06-10', // 端午节（示例）
            '2026-09-15', '2026-09-16', '2026-09-17', // 中秋节（示例）
            '2026-10-01', '2026-10-02', '2026-10-03', '2026-10-04', '2026-10-05', '2026-10-06', '2026-10-07', '2026-10-08', // 国庆节（示例）
        ];

        const workdays2026 = [
            // 调休工作日（周末需要上班的日期）
            // 根据实际2026年调休安排填写
        ];

        // 判断是否为工作日
        function isWorkday(date) {
            const dateStr = formatDateString(date);
            const dayOfWeek = date.getDay();
            
            // 如果是法定节假日，不是工作日
            if (holidays2026.includes(dateStr)) {
                return false;
            }
            
            // 如果是调休工作日，是工作日
            if (workdays2026.includes(dateStr)) {
                return true;
            }
            
            // 周一到周五是工作日
            return dayOfWeek >= 1 && dayOfWeek <= 5;
        }

        // 格式化日期字符串
        function formatDateString(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 渲染日历
        function renderCalendar() {
            const calendarGrid = document.getElementById('calendarGrid');
            const monthName = document.getElementById('currentMonth');
            monthName.textContent = `${currentYear}年${currentMonth + 1}月`;
            
            calendarGrid.innerHTML = '';
            
            // 添加星期标题
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            weekDays.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.style.textAlign = 'center';
                dayHeader.style.fontWeight = '600';
                dayHeader.style.padding = '12px 8px';
                dayHeader.style.background = '#f8f9fa';
                dayHeader.style.borderRadius = '8px';
                dayHeader.style.fontSize = '14px';
                dayHeader.textContent = day;
                calendarGrid.appendChild(dayHeader);
            });
            
            // 获取当月第一天和最后一天
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const firstDayOfWeek = firstDay.getDay();
            const daysInMonth = lastDay.getDate();
            
            // 填充空白
            for (let i = 0; i < firstDayOfWeek; i++) {
                const emptyDay = document.createElement('div');
                calendarGrid.appendChild(emptyDay);
            }
            
            // 生成日期
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const dateStr = formatDateString(date);
                const isWork = isWorkday(date);
                
                // 处理数据迁移：如果旧数据是字符串格式，转换为新格式
                let report = dailyReports[dateStr];
                if (typeof report === 'string') {
                    report = { work: report, fitness: '', todo: '' };
                    dailyReports[dateStr] = report;
                } else if (!report) {
                    report = { work: '', fitness: '', todo: '' };
                }
                
                const hasContent = report.work || report.fitness || report.todo;
                
                const dayElement = document.createElement('div');
                dayElement.className = `calendar-day ${isWork ? 'workday' : 'weekend'}`;
                if (hasContent) {
                    dayElement.classList.add('has-content');
                }
                
                // 生成预览内容
                let previewHTML = '';
                if (hasContent) {
                    if (report.work) {
                        const workPreview = report.work.length > 20 ? report.work.substring(0, 20) + '...' : report.work;
                        previewHTML += `<div class="day-preview-section day-preview-work"><span class="day-preview-section-title">💼</span>${escapeHtml(workPreview)}</div>`;
                    }
                    if (report.fitness) {
                        const fitnessPreview = report.fitness.length > 20 ? report.fitness.substring(0, 20) + '...' : report.fitness;
                        previewHTML += `<div class="day-preview-section day-preview-fitness"><span class="day-preview-section-title">🏃</span>${escapeHtml(fitnessPreview)}</div>`;
                    }
                    if (report.todo) {
                        const todoPreview = report.todo.length > 20 ? report.todo.substring(0, 20) + '...' : report.todo;
                        previewHTML += `<div class="day-preview-section day-preview-todo"><span class="day-preview-section-title">📋</span>${escapeHtml(todoPreview)}</div>`;
                    }
                }
                
                dayElement.innerHTML = `
                    <div class="calendar-day-header">${day}日</div>
                    <div class="calendar-day-date">${dateStr}</div>
                    ${previewHTML}
                `;
                
                dayElement.onclick = () => openDayEdit(dateStr, date);
                calendarGrid.appendChild(dayElement);
            }
            
            // 保存迁移后的数据
            if (Object.keys(dailyReports).some(key => typeof dailyReports[key] === 'string')) {
                localStorage.setItem('dailyReports', JSON.stringify(dailyReports));
            }
            
            updateMonthButtons();
        }


        // 获取星期几
        function getWeekday(date) {
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            return '星期' + weekdays[date.getDay()];
        }

        // 切换月份
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            // 限制年份范围在2025-2026
            if (currentYear < 2025) {
                currentYear = 2025;
                currentMonth = 0;
            } else if (currentYear > 2026) {
                currentYear = 2026;
                currentMonth = 11;
            }
            renderCalendar();
            updateMonthButtons();
        }

        // 更新月份按钮状态
        function updateMonthButtons() {
            const prevBtn = document.getElementById('prevMonthBtn');
            const nextBtn = document.getElementById('nextMonthBtn');
            if (prevBtn && nextBtn) {
                const isFirstMonth = currentYear === 2025 && currentMonth === 0;
                const isLastMonth = currentYear === 2026 && currentMonth === 11;
                prevBtn.disabled = isFirstMonth;
                nextBtn.disabled = isLastMonth;
                prevBtn.style.opacity = isFirstMonth ? '0.5' : '1';
                nextBtn.style.opacity = isLastMonth ? '0.5' : '1';
                prevBtn.style.cursor = isFirstMonth ? 'not-allowed' : 'pointer';
                nextBtn.style.cursor = isLastMonth ? 'not-allowed' : 'pointer';
            }
        }

        // 打开日报编辑
        function openDayEdit(dateStr, date) {
            currentEditingDate = dateStr;
            document.getElementById('dayEditDate').value = `${dateStr} ${getWeekday(date)}`;
            
            // 处理数据迁移：如果旧数据是字符串格式，转换为新格式
            let report = dailyReports[dateStr];
            if (typeof report === 'string') {
                report = { work: report, fitness: '', todo: '' };
                dailyReports[dateStr] = report;
                localStorage.setItem('dailyReports', JSON.stringify(dailyReports));
            } else if (!report) {
                report = { work: '', fitness: '', todo: '' };
            }
            
            document.getElementById('dayEditWork').value = report.work || '';
            document.getElementById('dayEditFitness').value = report.fitness || '';
            document.getElementById('dayEditTodo').value = report.todo || '';
            document.getElementById('dayEditModal').classList.add('active');
        }

        function closeDayEdit() {
            document.getElementById('dayEditModal').classList.remove('active');
            currentEditingDate = null;

        // 保存日报
        function saveDailyReport() {
            if (currentEditingDate) {
                dailyReports[currentEditingDate] = {
                    work: document.getElementById('dayEditWork').value.trim(),
                    fitness: document.getElementById('dayEditFitness').value.trim(),

                };

        // 生成周报
        function generateWeeklyReport() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            
            const weekReports = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(monday);
                date.setDate(monday.getDate() + i);
                const dateStr = formatDateString(date);
                let report = dailyReports[dateStr];
                if (report) {
                    // 处理数据迁移
                    if (typeof report === 'string') {
                        report = { work: report, fitness: '', todo: '' };
                    }
                    if (report.work || report.fitness || report.todo) {
                        weekReports.push({
                            date: dateStr,
                            weekday: getWeekday(date),
                            report: report
                        });
                    }
                }
            }
            
            if (weekReports.length === 0) {
                alert('本周还没有日报记录');
                return;
            }

## 本周工作总结

${weekReports.map(r => {
                let sections = [];

                if (r.report.fitness) sections.push(`🏃 **健身**\n${r.report.fitness}`);
                if (r.report.todo) sections.push(`📋 **待办**\n${r.report.todo}`);
                return `### ${r.date} ${r.weekday}\n\n${sections.join('\n\n')}`;

        // 导入Excel数据函数（必须在所有变量和函数定义之后）
        function importExcelData() {
            if (!confirm('确定要导入Excel数据吗？这将添加项目任务和工作日报，不会删除现有数据。')) {
                return;
            }
            
            let importedCount = 0;
            
            // 导入项目任务
            EXCEL_PROJECTS_DATA.forEach(project => {
                // 检查是否已存在同名任务
                const exists = tasks.some(t => t.title === project.title);
                if (!exists) {
                    const task = {
                        id: Date.now() + Math.random(),
                        title: project.title,
                        description: project.description,
                        priority: project.priority,
                        status: project.status,
                        progress: project.progress,
                        progressUpdates: [],
                        createdAt: new Date().toISOString()
                    };
                    tasks.push(task);
                    importedCount++;
                }
            });
            
            // 导入工作日报
            let reportsCount = 0;
            
            Object.keys(EXCEL_DAILY_REPORTS).forEach(dateStr => {
                const report = EXCEL_DAILY_REPORTS[dateStr];
                
                // 如果该日期已有日报，合并工作内容
                if (dailyReports[dateStr]) {
                    const existing = dailyReports[dateStr];
                    if (existing.work) {
                        dailyReports[dateStr].work = existing.work + '\n\n' + report.work;
                    } else {
                        dailyReports[dateStr].work = report.work;
                    }
                } else {
                    dailyReports[dateStr] = report;
                    reportsCount++;
                }
            });
            
            // 保存数据
            saveTasks();
            localStorage.setItem('dailyReports', JSON.stringify(dailyReports));
            
            // 刷新显示
            renderTasks();
            updateStats();
            if (document.getElementById('calendar-view')) {
                renderCalendar();
            }
            
            alert(`导入完成！\n- 新增 ${importedCount} 个项目任务\n- 新增 ${reportsCount} 条工作日报`);
        }
