<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定帧卡片 · 全版本展示台</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e1a; font-family: -apple-system, 'PingFang SC', 'SF Pro Display', sans-serif;
    display: flex; height: 100vh; overflow: hidden; color: #fff;
  }
  .sidebar {
    width: 260px; flex-shrink: 0; height: 100vh;
    background: #13132a;
    border-right: 1px solid rgba(255,255,255,.04);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .sidebar-header h1 {
    font-size: 18px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(135deg, #a08ce0, #6ecfa0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sidebar-header p { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 6px; }
  .sidebar-nav {
    flex: 1; overflow-y: auto; padding: 12px 12px 24px;
    -webkit-overflow-scrolling: touch;
  }
  .nav-group-label {
    font-size: 9px; font-weight: 700; color: rgba(255,255,255,.2);
    letter-spacing: 2px; text-transform: uppercase; padding: 16px 12px 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 14px; cursor: pointer;
    transition: all .2s; margin-bottom: 2px; border: 1px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,.04); }
  .nav-item.active { background: rgba(160,140,224,.1); border-color: rgba(160,140,224,.15); }
  .nav-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .nav-item.active .nav-icon { transform: scale(1.05); }
  .nav-icon.v0 { background: linear-gradient(135deg, rgba(74,86,80,.3), rgba(74,86,80,.15)); }
  .nav-icon.v1 { background: linear-gradient(135deg, rgba(160,140,224,.2), rgba(100,200,180,.1)); }
  .nav-icon.v2 { background: linear-gradient(135deg, rgba(26,42,58,.4), rgba(42,58,74,.2)); }
  .nav-icon.v3 { background: linear-gradient(135deg, rgba(196,163,110,.15), rgba(196,163,110,.08)); }
  .nav-icon.v4 { background: linear-gradient(135deg, rgba(160,140,224,.15), rgba(110,207,160,.1)); }
  .nav-icon.v5 { background: linear-gradient(135deg, rgba(255,215,0,.12), rgba(255,180,0,.06)); }
  .nav-icon.v6 { background: linear-gradient(135deg, rgba(196,163,110,.15), rgba(168,196,160,.1)); }
  .nav-info { flex: 1; min-width: 0; }
  .nav-name {
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,.8);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nav-item.active .nav-name { color: #fff; }
  .nav-desc {
    font-size: 10px; color: rgba(255,255,255,.25); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nav-badge {
    padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 600;
    letter-spacing: .5px; flex-shrink: 0;
  }
  .nav-badge.base { background: rgba(255,255,255,.06); color: rgba(255,255,255,.3); }
  .nav-badge.fancy { background: rgba(255,215,0,.1); color: rgba(255,215,0,.5); }
  .main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px; position: relative; overflow: hidden;
  }
  .main::before {
    content: ''; position: absolute;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(160,140,224,.08) 0%, transparent 70%);
    top: 10%; right: -10%; pointer-events: none;
  }
  .version-label {
    position: absolute; top: 32px; left: 40px;
    display: flex; align-items: center; gap: 12px;
  }
  .version-label h2 { font-size: 16px; font-weight: 700; color: rgba(255,255,255,.6); }
  .version-tag {
    padding: 3px 10px; border-radius: 8px; font-size: 10px; font-weight: 600;
    background: rgba(255,255,255,.05); color: rgba(255,255,255,.3);
    border: 1px solid rgba(255,255,255,.04);
  }
  .frame-wrapper {
    width: 375px; height: 812px; border-radius: 44px;
    overflow: hidden; position: relative;
    box-shadow: 0 30px 100px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .frame-wrapper:hover { transform: translateY(-4px); }
  .frame-wrapper iframe { width: 375px; height: 812px; border: none; border-radius: 44px; }
  .frame-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #13132a; border-radius: 44px;
    transition: opacity .4s; pointer-events: none;
  }
  .frame-loading.hidden { opacity: 0; }
  .frame-loading span { font-size: 13px; color: rgba(255,255,255,.3); letter-spacing: 2px; }
  .shortcuts {
    position: absolute; bottom: 32px; left: 40px; display: flex; gap: 16px;
  }
  .shortcut { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,.2); }
  .key {
    padding: 2px 8px; border-radius: 5px; background: rgba(255,255,255,.06);
    font-size: 10px; font-weight: 600; color: rgba(255,255,255,.3);
    border: 1px solid rgba(255,255,255,.06);
  }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>定帧卡片</h1>
    <p>灵光 · 百科卡片交互合集</p>
  </div>
  <div class="sidebar-nav">
    <div class="nav-group-label">基础版</div>
    <div class="nav-item active" data-src="c4_refined.html" data-name="精细版" data-tag="原版">
      <div class="nav-icon v0">📋</div>
      <div class="nav-info"><div class="nav-name">精细版 · Original</div><div class="nav-desc">百科卡片 + 右上角贴纸</div></div>
      <span class="nav-badge base">BASE</span>
    </div>
    <div class="nav-group-label">交互变体</div>
    <div class="nav-item" data-src="c4_flip.html" data-name="翻转卡片" data-tag="3D 翻转">
      <div class="nav-icon v1">🔄</div>
      <div class="nav-info"><div class="nav-name">翻转卡片 · Flip</div><div class="nav-desc">3D 翻转 + 鼠标跟随倾斜</div></div>
    </div>
    <div class="nav-item" data-src="c4_swipe.html" data-name="滑动故事卡" data-tag="Stories">
      <div class="nav-icon v2">👆</div>
      <div class="nav-info"><div class="nav-name">滑动故事卡 · Swipe</div><div class="nav-desc">左右滑动 + 进度条</div></div>
    </div>
    <div class="nav-item" data-src="c4_accordion.html" data-name="手风琴" data-tag="折叠展开">
      <div class="nav-icon v3">🪗</div>
      <div class="nav-info"><div class="nav-name">手风琴 · Accordion</div><div class="nav-desc">弹性展开 + 彩蛋信息</div></div>
    </div>
    <div class="nav-item" data-src="c4_immersive.html" data-name="沉浸式长卡片" data-tag="视差滚动">
      <div class="nav-icon v4">📖</div>
      <div class="nav-info"><div class="nav-name">沉浸式 · Immersive</div><div class="nav-desc">视差滚动 + 章节渐入</div></div>
    </div>
    <div class="nav-group-label">✦ Fancy</div>
    <div class="nav-item" data-src="c4_holographic.html" data-name="全息闪卡" data-tag="Holographic">
      <div class="nav-icon v5">🌈</div>
      <div class="nav-info"><div class="nav-name">全息闪卡 · Holo</div><div class="nav-desc">彩虹全息 + SSR 闪卡</div></div>
      <span class="nav-badge fancy">SSR</span>
    </div>
    <div class="nav-item" data-src="c4_scratch.html" data-name="刮刮卡" data-tag="刮刮乐">
      <div class="nav-icon v6">🎫</div>
      <div class="nav-info"><div class="nav-name">刮刮卡 · Scratch</div><div class="nav-desc">刮开揭秘 + 进度奖励</div></div>
      <span class="nav-badge fancy">SSR</span>
    </div>
  </div>
</div>
<div class="main">
  <div class="version-label">
    <h2 id="currentName">精细版</h2>
    <span class="version-tag" id="currentTag">原版</span>
  </div>
  <div class="frame-wrapper">
    <div class="frame-loading" id="frameLoading"><span>加载中 ...</span></div>
    <iframe id="previewFrame" src="c4_refined.html"></iframe>
  </div>
  <div class="shortcuts">
    <div class="shortcut"><span class="key">↑</span><span class="key">↓</span> 切换版本</div>
    <div class="shortcut"><span class="key">1</span>-<span class="key">7</span> 快速跳转</div>
  </div>
</div>
<script>
  const items = document.querySelectorAll('.nav-item');
  const frame = document.getElementById('previewFrame');
  const loading = document.getElementById('frameLoading');
  const nameEl = document.getElementById('currentName');
  const tagEl = document.getElementById('currentTag');
  let currentIndex = 0;
  function switchTo(index) {
    if (index < 0 || index >= items.length) return;
    currentIndex = index;
    items.forEach(i => i.classList.remove('active'));
    const item = items[index];
    item.classList.add('active');
    item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    nameEl.textContent = item.dataset.name;
    tagEl.textContent = item.dataset.tag;
    loading.classList.remove('hidden');
    frame.src = item.dataset.src;
  }
  frame.addEventListener('load', () => { loading.classList.add('hidden'); });
  items.forEach((item, i) => { item.addEventListener('click', () => switchTo(i)); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); switchTo(currentIndex - 1); }
    else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); switchTo(currentIndex + 1); }
    else if (e.key >= '1' && e.key <= '7') { switchTo(parseInt(e.key) - 1); }
  });
</script>
</body>
</html>
